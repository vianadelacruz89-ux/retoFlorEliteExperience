<!-- INSCRIPCION -->
<div class="panel" id="panel-inscripcion">

<form id="inscripcionForm">

  <div class="card">
    <h3><i class="ti ti-user-circle"></i> Datos básicos</h3>

    <div class="form-row">
      <input type="text" name="nombre" placeholder="Nombre completo" required />
      <input type="text" name="tiktok" placeholder="@usuario TikTok" required />
    </div>

    <div class="form-row">
      <input type="email" name="email" placeholder="Email" required />
      <input type="text" name="whatsapp" placeholder="WhatsApp" required />
    </div>
  </div>

  <div class="card">
    <h3><i class="ti ti-layout-list"></i> ¿En qué categoría participas?</h3>

    <div class="radio-group">
      <div class="radio-opt selected" onclick="selectCat(this, 'starter')">
        <div class="radio-dot"></div>
        <div><div style="font-weight:500">Starter Creator</div></div>
      </div>

      <div class="radio-opt" onclick="selectCat(this, 'grow')">
        <div class="radio-dot"></div>
        <div><div style="font-weight:500">TikTok Grow</div></div>
      </div>

      <div class="radio-opt" onclick="selectCat(this, 'elite')">
        <div class="radio-dot"></div>
        <div><div style="font-weight:500">Elite</div></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3><i class="ti ti-camera"></i> Capturas</h3>

    <div class="form-section">
      <div class="form-label">Seguidores actuales</div>
      <input type="file" name="seguidores" required>
    </div>

    <div class="form-section">
      <div class="form-label">Ventas / GMV</div>
      <input type="file" name="gmv" required>
    </div>

    <div class="form-section">
      <div class="form-label">Nivel academia</div>
      <input type="file" name="nivel" required>
    </div>
  </div>

  <button class="submit-btn" type="submit">
    <i class="ti ti-flag"></i> Confirmar inscripción
  </button>

</form>

<div class="success-state" id="success-state">
  <div class="success-icon"><i class="ti ti-check"></i></div>
  <div style="font-size:16px;font-weight:500">¡Inscripción enviada!</div>
</div>

</div>
