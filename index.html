<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reto Flor Elite Experience</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">

<style>
/* ===== TU CSS ORIGINAL (NO TOCADO) ===== */
/* 👉 PEGA AQUÍ TODO TU CSS TAL CUAL LO TENÍAS */
/* (lo dejo intacto para no romper diseño) */
</style>

</head>

<body>

<div class="container">

<!-- ===== TODO TU CONTENIDO ORIGINAL (NO TOCADO) ===== -->
<!-- HERO, TABS, PANELS, TODO IGUAL -->

<!-- INSCRIPCION (SOLO ESTA PARTE SE MODIFICA) -->
<div class="panel" id="panel-inscripcion">

  <form id="inscripcionForm">

    <div class="card">
      <h3>Datos básicos</h3>

      <div class="form-row">
        <input type="text" name="nombre" placeholder="Nombre completo" required>
        <input type="text" name="tiktok" placeholder="@TikTok" required>
      </div>

      <div class="form-row">
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="whatsapp" placeholder="WhatsApp" required>
      </div>
    </div>

    <div class="card">
      <h3>Categoría</h3>

      <div class="radio-group">
        <div class="radio-opt selected" onclick="selectCat(this,'starter')">Starter Creator</div>
        <div class="radio-opt" onclick="selectCat(this,'grow')">TikTok Grow</div>
        <div class="radio-opt" onclick="selectCat(this,'elite')">Elite</div>
      </div>
    </div>

    <div class="card">
      <h3>Capturas</h3>

      <input type="file" name="seguidores" required>
      <input type="file" name="gmv" required>
      <input type="file" name="nivel" required>

    </div>

    <button class="submit-btn" type="submit">
      Confirmar inscripción
    </button>

  </form>

  <div class="success-state" id="success-state">
    <div class="success-icon">✔</div>
    <h3>¡Inscripción enviada!</h3>
  </div>

</div>

</div>

<script>

/* ===== TU JS ORIGINAL ===== */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const map = {starter:'tab-s',grow:'tab-g',elite:'tab-e',inscripcion:'tab-i'};
  document.querySelector(`.tab.${map[tab]}`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

let categoria = "starter";

function selectCat(el, value) {
  document.querySelectorAll('.radio-opt').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  categoria = value;
}

/* ===== GOOGLE DRIVE UPLOAD FIX ===== */

const scriptURL = "https://script.google.com/macros/s/AKfycbwc4VfVSTI5CUXxPaTxhxC988Tq9ZIQJeDReRCAfbrjieAO89JQ3xuUmXPnsf194g7r/exec";

document.getElementById("inscripcionForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const formData = new FormData();

  formData.append("nombre", form.nombre.value);
  formData.append("tiktok", form.tiktok.value);
  formData.append("email", form.email.value);
  formData.append("whatsapp", form.whatsapp.value);
  formData.append("categoria", categoria);

  formData.append("seguidores", form.seguidores.files[0]);
  formData.append("gmv", form.gmv.files[0]);
  formData.append("nivel", form.nivel.files[0]);

  try {
    await fetch(scriptURL, {
      method: "POST",
      body: formData
    });

    form.style.display = "none";
    document.getElementById("success-state").style.display = "block";

  } catch (err) {
    alert("Error al enviar inscripción");
    console.log(err);
  }
});

</script>

</body>
</html>
