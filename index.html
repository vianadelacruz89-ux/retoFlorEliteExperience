<style>

<body>

<div class="container">

<!-- ===================== TODO TU HTML ORIGINAL ===================== -->
<!-- HERO -->
<!-- TABS -->
<!-- PANELS -->

<!-- ===================== SOLO MODIFICO INSCRIPCIÓN ===================== -->

<div class="panel" id="panel-inscripcion">

  <form id="inscripcionForm">

    <div class="card">
      <h3><i class="ti ti-user-circle"></i> Datos básicos</h3>

      <div class="form-row">
        <input type="text" name="nombre" placeholder="Nombre completo" required>
        <input type="text" name="tiktok" placeholder="@TikTok" required>
      </div>

      <div class="form-row">
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="whatsapp" placeholder="WhatsApp" required>
      </div>
    </div>

    <div class="card">
      <h3><i class="ti ti-layout-list"></i> Categoría</h3>

      <div class="radio-group">
        <div class="radio-opt selected" onclick="selectCat(this,'starter')">
          Starter Creator
        </div>
        <div class="radio-opt" onclick="selectCat(this,'grow')">
          TikTok Grow
        </div>
        <div class="radio-opt" onclick="selectCat(this,'elite')">
          Elite
        </div>
      </div>
    </div>

    <div class="card">
      <h3><i class="ti ti-camera"></i> Capturas</h3>

      <input type="file" name="seguidores" required>
      <input type="file" name="gmv" required>
      <input type="file" name="nivel" required>

    </div>

    <button class="submit-btn" type="submit">
      Confirmar inscripción
    </button>

  </form>

  <div class="success-state" id="success-state">
    <div class="success-icon">✔</div>
    <h3>¡Inscripción enviada!</h3>
  </div>

</div>

<!-- ===================== TODO LO DEMÁS SIGUE IGUAL ===================== -->
<!-- TODO TU RESTO DE PANELS, TABS, HERO, ETC SIN CAMBIOS -->

</div>

<script>

/* ===================== TU JS ORIGINAL (NO TOCADO) ===================== */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const map = {starter:'tab-s',grow:'tab-g',elite:'tab-e',inscripcion:'tab-i'};
  document.querySelector(`.tab.${map[tab]}`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

let categoria = "starter";

function selectCat(el, value) {
  document.querySelectorAll('.radio-opt').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  categoria = value;
}

/* ===================== SOLO AÑADO ENVÍO A DRIVE ===================== */

const scriptURL = "https://script.google.com/macros/s/AKfycbwc4VfVSTI5CUXxPaTxhxC988Tq9ZIQJeDReRCAfbrjieAO89JQ3xuUmXPnsf194g7r/exec";

document.getElementById("inscripcionForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const formData = new FormData();

  formData.append("nombre", form.nombre.value);
  formData.append("tiktok", form.tiktok.value);
  formData.append("email", form.email.value);
  formData.append("whatsapp", form.whatsapp.value);
  formData.append("categoria", categoria);

  formData.append("seguidores", form.seguidores.files[0]);
  formData.append("gmv", form.gmv.files[0]);
  formData.append("nivel", form.nivel.files[0]);

  try {
    await fetch(scriptURL, {
      method: "POST",
      body: formData
    });

    form.style.display = "none";
    document.getElementById("success-state").style.display = "block";

  } catch (err) {
    alert("Error al enviar inscripción");
    console.log(err);
  }
});

</script>

</body>
</html>
